<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="login.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="login-container">
    <h2>🔒 Reset Password</h2>
    <p class="subtitle">Enter your email to receive a reset link.</p>
    <form id="forgotForm">
      <div class="input-group">
        <input type="email" id="email" required placeholder="Enter your email address" />
      </div>
      <button type="submit">Verify Email</button>
    </form>
    <p class="footer-text"><a href="login.html">Back to Login</a></p>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const res = await fetch(`${CONFIG.API_BASE_URL}/api/password/reset?email=${encodeURIComponent(email)}`, {
          method: 'POST'
      });
      alert(res.ok ? "Reset instructions have been sent to your email." : "Failed to reset password. Check email.");
      if (res.ok) window.location.href = 'login.html';
    });
  </script>
</body>
</html>
