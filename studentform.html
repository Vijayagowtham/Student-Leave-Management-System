<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Leave Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
    }

    .form-container, .success-page {
      background: #ffffff;
      width: 100%;
      max-width: 800px;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      height: auto;
      position: relative;
      z-index: 1;
      overflow: visible;
    }

    .flatpickr-calendar {
      z-index: 9999 !important;
    }

    h2 {
      text-align: center;
      color: #1976d2;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
    }

    .field-pair {
      display: flex;
      gap: 15px;
      margin-top: 12px;
    }

    .field-pair label {
      flex: 1;
      margin-top: 0;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s;
    }

    button:hover {
      background: #0d47a1;
      transform: scale(1.02);
    }

    .success-page {
      display: none;
      text-align: center;
    }

    .success-page h1 {
      color: green;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .details-card {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      text-align: left;
    }

    .details-card h3 {
      margin-bottom: 10px;
      color: #1976d2;
    }

    .details-card p {
      margin: 6px 0;
      font-size: 15px;
    }

    @media (max-width: 600px) {
      .field-pair {
        flex-direction: column;
      }

      .form-container, .success-page {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Form Container -->
  <div class="form-container" id="formSection">
    <h2>Student Leave Form</h2>
    <form onsubmit="event.preventDefault(); submitForm();">

      <label>Student Name:
        <input type="text" id="studentName" required>
      </label>

      <label>Roll Number:
        <input type="text" id="rollNumber" required>
      </label>

      <div class="field-pair">
        <label>Course:
          <input type="text" id="course" required>
        </label>
        <label>Branch:
          <input type="text" id="branch" required>
        </label>
      </div>

      <div class="field-pair">
        <label>Section:
          <input type="text" id="section" required>
        </label>
        <label>Total Days:
          <input type="number" id="totalDays" readonly required>
        </label>
      </div>

      <label>From Date:
        <input type="text" id="fromDate" required>
      </label>

      <label>To Date:
        <input type="text" id="toDate" required>
      </label>

      <label>Reason:
        <textarea id="reason" rows="3" required></textarea>
      </label>

      <div class="field-pair">
        <label>Parent Name:
          <input type="text" id="parentName" required>
        </label>
        <label>Relationship:
          <input type="text" id="relationship" required>
        </label>
      </div>

      <label>Phone Number:
        <input type="text" id="phone" required>
      </label>

      <button type="submit">Submit Leave Request</button>
    </form>
  </div>

  <!-- Success Page -->
  <div class="success-page" id="successPage">
    <h1>Leave Request Submitted!</h1>
    <p>Your form has been successfully submitted.</p>

    <div class="details-card" id="submittedDetails">
      <h3>Submitted Details:</h3>
      <p><strong>Student Name:</strong> <span id="dName"></span></p>
      <p><strong>Roll Number:</strong> <span id="dRoll"></span></p>
      <p><strong>Course:</strong> <span id="dCourse"></span></p>
      <p><strong>Branch:</strong> <span id="dBranch"></span></p>
      <p><strong>Section:</strong> <span id="dSection"></span></p>
      <p><strong>From Date:</strong> <span id="dFrom"></span></p>
      <p><strong>To Date:</strong> <span id="dTo"></span></p>
      <p><strong>Total Days:</strong> <span id="dDays"></span></p>
      <p><strong>Reason:</strong> <span id="dReason"></span></p>
      <p><strong>Parent Name:</strong> <span id="dParent"></span></p>
      <p><strong>Relationship:</strong> <span id="dRelation"></span></p>
      <p><strong>Phone:</strong> <span id="dPhone"></span></p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    flatpickr("#fromDate", {
      dateFormat: "Y-m-d",
      onChange: calculateDays,
      appendTo: document.querySelector(".form-container")
    });

    flatpickr("#toDate", {
      dateFormat: "Y-m-d",
      onChange: calculateDays,
      appendTo: document.querySelector(".form-container")
    });

    function calculateDays() {
      const from = document.getElementById("fromDate").value;
      const to = document.getElementById("toDate").value;
      if (from && to) {
        const date1 = new Date(from);
        const date2 = new Date(to);
        const diff = Math.floor((date2 - date1) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById("totalDays").value = diff > 0 ? diff : 0;
      }
    }

    function submitForm() {
      const data = {
        studentName: document.getElementById('studentName').value,
        rollNumber: document.getElementById('rollNumber').value,
        course: document.getElementById('course').value,
        branch: document.getElementById('branch').value,
        section: document.getElementById('section').value,
        fromDate: document.getElementById('fromDate').value,
        toDate: document.getElementById('toDate').value,
        totalDays: document.getElementById('totalDays').value,
        reason: document.getElementById('reason').value,
        parentName: document.getElementById('parentName').value,
        relationship: document.getElementById('relationship').value,
        phone: document.getElementById('phone').value,
        status: "PENDING"
      };

      // Show success page
      document.getElementById('formSection').style.display = "none";
      document.getElementById('successPage').style.display = "block";

      // Populate details
      document.getElementById("dName").textContent = data.studentName;
      document.getElementById("dRoll").textContent = data.rollNumber;
      document.getElementById("dCourse").textContent = data.course;
      document.getElementById("dBranch").textContent = data.branch;
      document.getElementById("dSection").textContent = data.section;
      document.getElementById("dFrom").textContent = data.fromDate;
      document.getElementById("dTo").textContent = data.toDate;
      document.getElementById("dDays").textContent = data.totalDays;
      document.getElementById("dReason").textContent = data.reason;
      document.getElementById("dParent").textContent = data.parentName;
      document.getElementById("dRelation").textContent = data.relationship;
      document.getElementById("dPhone").textContent = data.phone;

      // Send to backend (uncomment when ready)
      // fetch("http://localhost:8080/leaveform/ins", {
      //   method: "POST",
      //   headers
    }
    </script>
    </body>
    </html>
