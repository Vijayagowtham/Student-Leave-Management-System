<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Leave Application</title>
  <link rel="stylesheet" href="student.css" />
</head>
<body>
  <!-- Floating bubbles animation -->
  <ul class="bubbles">
    <li></li><li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>

  <!-- Success Message -->
  <div id="successPage" class="success-page">
    <h1>✅ Application Submitted Successfully!</h1>
    <p>Your leave request has been recorded.</p>
  </div>

  <!-- Leave Form -->
  <div class="form-container" id="formContainer">
    <h2>🎓 Student Leave Application Form</h2>
    <form id="leaveForm">
      <!-- Student Details -->
      <fieldset>
        <legend>Student Details</legend>
        <label>Student Name:</label>
        <input type="text" id="name" required />
        <label>Roll Number:</label>
        <input type="text" id="rollno" required />
        <label>Course:</label>
        <input type="text" id="course" required />
        <label>Branch:</label>
        <input type="text" id="branch" required />
        <label>Section:</label>
        <input type="text" id="section" required />
      </fieldset>

      <!-- Leave Details -->
      <fieldset>
        <legend>Leave Details</legend>
        <label>From Date:</label>
        <input type="date" id="from" required />
        <label>To Date:</label>
        <input type="date" id="to" required />
        <label>Total Number of Days:</label>
        <input type="number" id="days" readonly />
        <label>Reason:</label>
        <textarea id="reason" rows="3" required></textarea>
      </fieldset>

      <!-- Parent/Guardian Details -->
      <fieldset>
        <legend>Parent/Guardian Details</legend>
        <label>Parent/Guardian Name:</label>
        <input type="text" id="parentName" required />
        <label>Relationship:</label>
        <input type="text" id="relation" required />
        <label>Phone Number:</label>
        <input type="tel" id="phone" pattern="[0-9]{10}" required />
      </fieldset>

      <button type="submit">Submit Application</button>
    </form>
  </div>
  <script>
    
  </script>
  
</body>
</html>
